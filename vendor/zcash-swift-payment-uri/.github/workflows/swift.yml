name: Swift

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            swift: "5.10"
            use-setup-swift: true
          # Swift 6: use runner's native Xcode/Swift (properly matched)
          - os: macos-15
            swift: "6.0"
            use-setup-swift: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift ${{ matrix.swift }}
        if: ${{ matrix.use-setup-swift }}
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test